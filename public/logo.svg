<svg width="400" height="60" viewBox="0 0 400 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" />
      <feOffset dx="0" dy="1" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon Mark (Rounded Square + Check) -->
  <g transform="translate(12, 10)">
    <rect x="0" y="0" width="40" height="40" rx="12" fill="url(#logoGradient)" filter="url(#shadow)" />
    <!-- Dynamic Checkmark -->
    <path d="M11,21 L18,28 L29,12" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" from="0,50" to="50,0" dur="0.8s" fill="freeze" />
    </path>
  </g>
  
  <!-- Typography -->
  <g transform="translate(68, 41)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="30" fill="#0f172a" style="letter-spacing: -1.2px;">
      Presti<tspan fill="#06b6d4">diretto</tspan>
    </text>
    <text y="14" font-family="'Inter', sans-serif" font-weight="600" font-size="9" fill="#94a3b8" style="letter-spacing: 1.5px; text-transform: uppercase;">
      Il tuo prestito, diretto
    </text>
  </g>
</svg>
